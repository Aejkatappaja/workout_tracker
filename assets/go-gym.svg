<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" width="760" height="280" role="img" aria-label="Three Go gophers working out at the GO-GYM">
  <defs>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7cc7e0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7cc7e0" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#b39ae0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#7cc7e0" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#7cc7e0" stop-opacity="0"/>
    </radialGradient>

    <!-- Iconic Go gopher. Body color from the c custom prop, darker parts from d. -->
    <symbol id="gopher" viewBox="0 0 120 158" overflow="visible">
      <ellipse cx="44" cy="150" rx="13" ry="8" fill="var(--d)"/>
      <ellipse cx="76" cy="150" rx="13" ry="8" fill="var(--d)"/>
      <circle cx="33" cy="24" r="12" fill="var(--c)"/>
      <circle cx="33" cy="24" r="5.5" fill="var(--d)"/>
      <circle cx="87" cy="24" r="12" fill="var(--c)"/>
      <circle cx="87" cy="24" r="5.5" fill="var(--d)"/>
      <ellipse cx="60" cy="86" rx="47" ry="64" fill="var(--c)"/>
      <ellipse cx="60" cy="100" rx="31" ry="44" fill="#ffffff" opacity="0.16"/>
      <circle cx="40" cy="44" r="21" fill="#f3f5fb"/>
      <circle cx="80" cy="44" r="21" fill="#f3f5fb"/>
      <circle cx="48" cy="49" r="9" fill="#15171e"/>
      <circle cx="72" cy="49" r="9" fill="#15171e"/>
      <circle cx="51.5" cy="45.5" r="2.6" fill="#f3f5fb"/>
      <circle cx="75.5" cy="45.5" r="2.6" fill="#f3f5fb"/>
      <ellipse cx="60" cy="63" rx="6.5" ry="5" fill="#15171e"/>
      <rect x="51.5" y="69" width="17" height="17" rx="3.5" fill="#f3f5fb" stroke="#cdd2df" stroke-width="1"/>
      <line x1="60" y1="69" x2="60" y2="86" stroke="#cdd2df" stroke-width="1"/>
    </symbol>

    <g id="dumbbell">
      <rect x="-3.5" y="-3" width="7" height="30" rx="3.5" fill="#9aa3bd"/>
      <rect x="-12" y="-13" width="24" height="14" rx="3.5" fill="#d9c07a"/>
      <rect x="-12" y="27" width="24" height="14" rx="3.5" fill="#d9c07a"/>
    </g>
  </defs>

  <rect x="1.5" y="1.5" width="757" height="277" rx="18" fill="#15171e" stroke="#2b2f3d" stroke-width="2"/>
  <rect x="1.5" y="1.5" width="757" height="277" rx="18" fill="url(#glow)"/>

  <text x="34" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="700" fill="#d9c07a">~<tspan fill="#7cc7e0">/</tspan>GO-GYM</text>
  <text x="726" y="46" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#6b7590">gains with go</text>

  <rect x="40" y="252" width="680" height="2" fill="url(#floor)"/>

  <!-- ===== Blue gopher: squats with a barbell ===== -->
  <g transform="translate(88,96)" style="--c:#80c8e0; --d:#3f8fab;">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 28; 0 0" keyTimes="0;0.5;1" dur="1.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
      <!-- barbell resting across the shoulders -->
      <g transform="translate(60,40)">
        <rect x="-78" y="-5" width="156" height="7" rx="3.5" fill="#9aa3bd"/>
        <rect x="-78" y="-14" width="15" height="25" rx="3" fill="#15171e" stroke="#7cc7e0" stroke-width="2.5"/>
        <rect x="63" y="-14" width="15" height="25" rx="3" fill="#15171e" stroke="#7cc7e0" stroke-width="2.5"/>
      </g>
      <use href="#gopher" width="120" height="158"/>
      <!-- arms raised, gripping the bar -->
      <rect x="17" y="40" width="12" height="38" rx="6" fill="#3f8fab" transform="rotate(12 23 78)"/>
      <rect x="91" y="40" width="12" height="38" rx="6" fill="#3f8fab" transform="rotate(-12 97 78)"/>
    </g>
  </g>

  <!-- ===== Green gopher: alternating dumbbell curls ===== -->
  <g transform="translate(320,96)" style="--c:#8fd6ad; --d:#4f9e78;">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 6; 0 0" dur="1.1s" repeatCount="indefinite"/>
      <use href="#gopher" width="120" height="158"/>
      <g transform="translate(16,74)">
        <animateTransform attributeName="transform" type="rotate" values="0 0 0; -125 0 0; 0 0 0" keyTimes="0;0.5;1" dur="1.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" additive="sum"/>
        <rect x="-6" y="0" width="12" height="44" rx="6" fill="#4f9e78"/>
        <use href="#dumbbell" transform="translate(0,48)"/>
      </g>
      <g transform="translate(104,74)">
        <animateTransform attributeName="transform" type="rotate" values="0 0 0; 125 0 0; 0 0 0" keyTimes="0;0.5;1" dur="1.1s" begin="-0.55s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" additive="sum"/>
        <rect x="-6" y="0" width="12" height="44" rx="6" fill="#4f9e78"/>
        <use href="#dumbbell" transform="translate(0,48)"/>
      </g>
    </g>
  </g>

  <!-- ===== Yellow gopher: jumping jacks ===== -->
  <g transform="translate(552,96)" style="--c:#dcc17f; --d:#b0904a;">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -24; 0 0" keyTimes="0;0.5;1" dur="0.7s" repeatCount="indefinite" calcMode="spline" keySplines="0.3 0 0.3 1; 0.3 0 0.3 1"/>
      <use href="#gopher" width="120" height="158"/>
      <g transform="translate(16,72)">
        <animateTransform attributeName="transform" type="rotate" values="12 0 0; 155 0 0; 12 0 0" keyTimes="0;0.5;1" dur="0.7s" repeatCount="indefinite" additive="sum"/>
        <rect x="-6" y="0" width="12" height="42" rx="6" fill="#b0904a"/>
      </g>
      <g transform="translate(104,72)">
        <animateTransform attributeName="transform" type="rotate" values="-12 0 0; -155 0 0; -12 0 0" keyTimes="0;0.5;1" dur="0.7s" repeatCount="indefinite" additive="sum"/>
        <rect x="-6" y="0" width="12" height="42" rx="6" fill="#b0904a"/>
      </g>
    </g>
  </g>
</svg>
